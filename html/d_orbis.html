   .loading,
			.content-loading {
				--top-offset: 50%;
				pointer-events: none;
			}

			.loading::before,
			.content-loading::before {
				content: '';
				position: absolute;
				left: 0;
				right: 0;
				bottom: 0;
				top: 0;
				opacity: 1;
				z-index: 101;
			}

			.loading.loading-before-app::before,
			.content-loading.loading-before-app::before {
				z-index: 0;
				background-color: transparent;
			}

			.loading.loading-before-app::after,
			.content-loading.loading-before-app::after {
				z-index: 0;
			}

			.loading::after,
			.content-loading::after {
				content: '';
				background: url(/assets/images/spinner.svg) no-repeat center;
				width: 64px;
				height: 64px;
				position: absolute;
				top: var(--top-offset);
				left: 50%;
				margin-top: -32px;
				margin-left: -32px;
				z-index: 10;
				text-rendering: auto;
				line-height: inherit;
				-webkit-font-smoothing: antialiased;
				-moz-osx-font-smoothing: grayscale;
				-webkit-animation: mdi-spin 0.7s infinite linear;
				animation: mdi-spin 0.7s infinite linear;
				pointer-events: none;
				z-index: 101;
			}

			@keyframes mdi-spin {
				0% {
					-webkit-transform: rotate(0deg);
					transform: rotate(0deg);
				}

				100% {
					-webkit-transform: rotate(359deg);
					transform: rotate(359deg);
				}
			}

			.d-main_inner {
				background-color: #e3e8f1;
			}
